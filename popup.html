<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CSS Scratchpad</title>
    <style>
      body {
        width: 360px;
        margin: 0;
        padding: 12px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      textarea {
        width: 100%;
        height: 260px;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        resize: vertical;
      }

      .buttons {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        padding: 8px;
        cursor: pointer;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <h1>CSS Scratchpad</h1>

    <textarea id="cssInput" spellcheck="false" placeholder="Paste CSS here..."></textarea>

    <div class="buttons">
      <button id="applyBtn">Apply CSS</button>
      <button id="removeBtn">Unapply CSS</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
